name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -x --tb=short
      - name: Lint
        run: ruff check py2dataiku/
      - name: Type check
        run: mypy py2dataiku/

  node:
    name: Node 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Build
        run: pnpm -r --if-present build
      - name: Test
        run: pnpm -r --if-present test

  e2e:
    name: E2E (placeholder)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [node]
    steps:
      - uses: actions/checkout@v4
      - name: Playwright placeholder
        run: echo "playwright placeholder — real Playwright config arrives in M8"

  storybook:
    name: Storybook (placeholder)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [node]
    steps:
      - uses: actions/checkout@v4
      - name: Storybook placeholder
        run: echo "storybook visual regression placeholder — real config arrives in M8"
