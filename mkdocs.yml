site_name: py-iku
site_description: Convert Python data processing code to Dataiku DSS recipes and flows
site_url: https://m-deane.github.io/py-iku
repo_url: https://github.com/m-deane/py-iku
repo_name: m-deane/py-iku

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_bases: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - admonition
  - tables
  - toc:
      permalink: true

exclude_docs: |
  /textbook/STYLE.md
  /textbook/_outline.md
  /textbook/_running_example.md

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Notebooks & Examples: notebooks.md
  - Textbook:
    - textbook/index.md
    - 1. Why py-iku: textbook/01-why-py-iku.md
    - 2. The five-second tour: textbook/02-five-second-tour.md
    - 3. Anatomy of a flow: textbook/03-anatomy-of-a-flow.md
    - 4. Pandas to DSS grammar: textbook/04-pandas-to-dss-grammar.md
    - 5. Prepare recipes deep dive: textbook/05-prepare-recipes-deep-dive.md
    - 6. Recipe types tour: textbook/06-recipe-types-tour.md
    - 7. The LLM path: textbook/07-the-llm-path.md
    - 8. Filters and predicates: textbook/08-filters-and-predicates.md
    - 9. Advanced patterns: textbook/09-advanced-patterns.md
    - 10. Optimization and the DAG: textbook/10-optimization-and-dag.md
    - 11. Production usage: textbook/11-production-usage.md
    - 12. Extending py-iku: textbook/12-extending-py-iku.md
    - "13. Visual Aids & Inspection": textbook/13-visual-aids-and-inspection.md
    - "Worked Examples I: Trade Capture and Validation": textbook/examples-01-trade-capture-and-validation.md
    - "Worked Examples II: Position and P&L Analytics": textbook/examples-02-position-and-pnl-analytics.md
    - "Worked Examples III: Counterparty and Curves": textbook/examples-03-counterparty-and-curves.md
    - "Worked Examples IV: Power Hubs and Trade Events": textbook/examples-04-power-hubs-and-trade-events.md
    - "Appendix A: Glossary": textbook/appendix-a-glossary.md
    - "Appendix B: Troubleshooting": textbook/appendix-b-troubleshooting.md
    - "Appendix C: Cheatsheet": textbook/appendix-c-cheatsheet.md
  - API Reference:
    - Overview: api/index.md
    - Core Functions: api/core-functions.md
    - Py2Dataiku Class: api/py2dataiku-class.md
    - Models: api/models.md
    - Enums: api/enums.md
    - LLM Providers: api/llm-providers.md
    - Visualizers: api/visualizers.md
    - Exporters: api/exporters.md
    - DSS Integration: api/integration.md
    - Plugin System: api/plugins.md
    - Configuration: api/configuration.md
    - Exceptions: api/exceptions.md
    - Graph: api/graph.md
    - Recipe Settings: api/recipe-settings.md
    - Scenarios & Metrics: api/scenarios-metrics.md
    - MLOps: api/mlops.md
  - Auto-generated API:
    - py2dataiku: reference/index.md
  - Future Work:
    - DSS Write-back: future-dss-writeback.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/m-deane/py-iku
