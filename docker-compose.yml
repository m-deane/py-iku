version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./apps/api:/app
      - ./py2dataiku:/py2dataiku

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules

  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./docs:/app
      - /app/node_modules
