    <linearGradient id="grad-default" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F5F5F5" stop-opacity="0.7"/>
    </linearGradient>
