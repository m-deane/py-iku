    <linearGradient id="grad-distinct" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFEBE9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EFEBE9" stop-opacity="0.7"/>
