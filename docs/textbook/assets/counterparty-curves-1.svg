          fill="#E65100"
          filter="url(#text-shadow)">⚙</text>
    <text x="35.0" y="45.0"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="11"
          font-weight="600"
          fill="#E65100"
          filter="url(#text-shadow)">Prepare</text>
    <text x="35.0" y="57.0"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="9"
          fill="#E65100" opacity="0.7">1 steps</text>
  </g>
  <g class="recipe prepare" transform="translate(960.0, 210.0)">
    <rect width="70" height="70"
