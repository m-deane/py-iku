<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1290 320"
     width="1290" height="320"
     style="background-color: #FAFAFA">
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>

    <!-- Text shadow filter -->
    <filter id="text-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-opacity="0.3"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#90A4AE"/>
    </marker>

    <!-- Dataset icon -->
    <symbol id="dataset-icon" viewBox="0 0 24 24">
      <ellipse cx="12" cy="6" rx="8" ry="3" fill="currentColor" opacity="0.3"/>
      <path d="M4 6v12c0 1.66 3.58 3 8 3s8-1.34 8-3V6"
            fill="none" stroke="currentColor" stroke-width="1.5"/>
      <ellipse cx="12" cy="6" rx="8" ry="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <linearGradient id="grad-prepare" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFF3E0" stop-opacity="0.7"/>
    </linearGradient>

    <linearGradient id="grad-join" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E3F2FD" stop-opacity="0.7"/>
    </linearGradient>

    <linearGradient id="grad-stack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F3E5F5" stop-opacity="0.7"/>
    </linearGradient>

    <linearGradient id="grad-grouping" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E8F5E9" stop-opacity="0.7"/>
    </linearGradient>

    <linearGradient id="grad-window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F7FA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E0F7FA" stop-opacity="0.7"/>
    </linearGradient>

    <linearGradient id="grad-split" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FCE4EC" stop-opacity="0.7"/>
