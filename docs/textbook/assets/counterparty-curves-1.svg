    <linearGradient id="grad-pivot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E1F5FE" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E1F5FE" stop-opacity="0.7"/>
