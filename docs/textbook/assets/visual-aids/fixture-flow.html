<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>converted_flow - Dataiku Flow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 100%;
            overflow: auto;
        }
        h1 {
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }
        canvas {
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #FAFAFA;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #tooltip {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 1000;
        }
        .legend {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid;
        }
    </style>
</head>
<body>
    <h1>converted_flow</h1>
    <div class="container">
        <canvas id="flowCanvas" width="1290" height="280"></canvas>
    </div>
    <div id="tooltip"></div>
    <div class="legend" id="legend"></div>

    <script>
        const nodes = [
  {
    "id": "orders",
    "x": 40.0,
    "y": 40.0,
    "width": 160,
    "height": 50,
    "type": "dataset",
    "label": "orders",
    "layer": 0,
    "datasetType": "input"
  },
  {
    "id": "customers",
    "x": 40.0,
    "y": 190.0,
    "width": 160,
    "height": 50,
    "type": "dataset",
    "label": "customers",
    "layer": 0,
    "datasetType": "input"
  },
  {
    "id": "recipe_0",
    "x": 260.0,
    "y": 105.0,
    "width": 70,
    "height": 70,
    "type": "recipe",
    "label": "prepare_1",
    "layer": 1,
    "recipeType": "prepare",
    "details": "1 steps",
    "icon": "\u2699"
  },
  {
    "id": "orders_prepared",
    "x": 390.0,
    "y": 115.0,
    "width": 160,
    "height": 50,
    "type": "dataset",
    "label": "orders_prepared",
    "layer": 2,
    "datasetType": "intermediate"
  },
  {
    "id": "recipe_1",
    "x": 610.0,
    "y": 105.0,
    "width": 70,
    "height": 70,
    "type": "recipe",
    "label": "join_2",
    "layer": 3,
    "recipeType": "join",
    "details": "LEFT",
    "icon": "\u22c8"
  },
  {
    "id": "enriched",
    "x": 740.0,
    "y": 115.0,
    "width": 160,
    "height": 50,
    "type": "dataset",
    "label": "enriched",
    "layer": 4,
    "datasetType": "intermediate"
  },
  {
    "id": "recipe_2",
    "x": 960.0,
    "y": 105.0,
    "width": 70,
    "height": 70,
    "type": "recipe",
    "label": "grouping_3",
    "layer": 5,
    "recipeType": "grouping",
    "details": "1 aggs",
    "icon": "\u03a3"
  },
  {
    "id": "top_customers",
    "x": 1090.0,
    "y": 115.0,
    "width": 160,
    "height": 50,
    "type": "dataset",
    "label": "top_customers",
    "layer": 6,
    "datasetType": "intermediate"
  }
];
        const edges = [
  {
    "source": "orders",
    "target": "recipe_0"
  },
  {
    "source": "recipe_0",
    "target": "orders_prepared"
  },
  {
    "source": "orders_prepared",
    "target": "recipe_1"
  },
  {
    "source": "customers",
    "target": "recipe_1"
  },
  {
    "source": "recipe_1",
    "target": "enriched"
  },
  {
    "source": "enriched",
    "target": "recipe_2"
  },
  {
    "source": "recipe_2",
    "target": "top_customers"
  }
];
        const theme = {
  "background": "#FAFAFA",
  "connectionColor": "#90A4AE",
  "connectionWidth": 2,
  "fontFamily": "Arial, Helvetica, sans-serif",
  "datasetFontSize": 13,
  "recipeFontSize": 11,
  "iconFontSize": 20,
  "datasetRadius": 6,
  "recipeRadius": 10,
  "input": {
    "bg": "#E3F2FD",
    "border": "#4A90D9",
    "text": "#1565C0"
  },
  "output": {
    "bg": "#E8F5E9",
    "border": "#43A047",
    "text": "#2E7D32"
  },
  "intermediate": {
    "bg": "#ECEFF1",
    "border": "#78909C",
    "text": "#455A64"
  },
  "recipes": {
    "prepare": {
      "bg": "#FFF3E0",
      "border": "#FF9800",
      "text": "#E65100"
    },
    "join": {
      "bg": "#E3F2FD",
      "border": "#2196F3",
      "text": "#1565C0"
    },
    "stack": {
      "bg": "#F3E5F5",
      "border": "#9C27B0",
      "text": "#6A1B9A"
    },
    "grouping": {
      "bg": "#E8F5E9",
      "border": "#4CAF50",
      "text": "#2E7D32"
    },
    "window": {
      "bg": "#E0F7FA",
      "border": "#00BCD4",
      "text": "#00838F"
    },
    "split": {
      "bg": "#FCE4EC",
      "border": "#E91E63",
      "text": "#AD1457"
    },
    "sort": {
      "bg": "#FFFDE7",
      "border": "#FFC107",
      "text": "#FF8F00"
    },
    "distinct": {
      "bg": "#EFEBE9",
      "border": "#795548",
      "text": "#4E342E"
    },
    "filter": {
      "bg": "#FBE9E7",
      "border": "#FF5722",
      "text": "#D84315"
    },
    "python": {
      "bg": "#E8EAF6",
      "border": "#3F51B5",
      "text": "#283593"
    },
    "sync": {
      "bg": "#ECEFF1",
      "border": "#607D8B",
      "text": "#37474F"
    },
    "sample": {
      "bg": "#F1F8E9",
      "border": "#8BC34A",
      "text": "#558B2F"
    },
    "pivot": {
      "bg": "#E1F5FE",
      "border": "#03A9F4",
      "text": "#0277BD"
    },
    "top_n": {
      "bg": "#FFF8E1",
      "border": "#FFB300",
      "text": "#FF6F00"
    },
    "default": {
      "bg": "#F5F5F5",
      "border": "#9E9E9E",
      "text": "#616161"
    }
  }
};

        const canvas = document.getElementById('flowCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');

        // Position lookup
        const nodeMap = new Map();
        nodes.forEach(n => nodeMap.set(n.id, n));

        function drawFlow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw edges
            edges.forEach(edge => {
                const source = nodeMap.get(edge.source);
                const target = nodeMap.get(edge.target);
                if (source && target) {
                    drawEdge(source, target);
                }
            });

            // Draw nodes
            nodes.forEach(node => {
                if (node.type === 'dataset') {
                    drawDataset(node);
                } else {
                    drawRecipe(node);
                }
            });
        }

        function drawEdge(source, target) {
            const x1 = source.x + source.width;
            const y1 = source.y + source.height / 2;
            const x2 = target.x;
            const y2 = target.y + target.height / 2;

            ctx.beginPath();
            ctx.moveTo(x1, y1);

            // Bezier curve
            const cp1x = x1 + (x2 - x1) / 2;
            const cp2x = x2 - (x2 - x1) / 2;
            ctx.bezierCurveTo(cp1x, y1, cp2x, y2, x2, y2);

            ctx.strokeStyle = theme.connectionColor;
            ctx.lineWidth = theme.connectionWidth;
            ctx.stroke();

            // Arrow
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const arrowSize = 8;
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - arrowSize * Math.cos(angle - Math.PI / 6),
                       y2 - arrowSize * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - arrowSize * Math.cos(angle + Math.PI / 6),
                       y2 - arrowSize * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = theme.connectionColor;
            ctx.fill();
        }

        function drawDataset(node) {
            const colors = theme[node.datasetType] || theme.intermediate;

            // Background
            ctx.beginPath();
            roundRect(ctx, node.x, node.y, node.width, node.height, theme.datasetRadius);
            ctx.fillStyle = colors.bg;
            ctx.fill();
            ctx.strokeStyle = colors.border;
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Icon
            ctx.fillStyle = colors.border;
            ctx.font = '16px Arial';
            ctx.fillText('📊', node.x + 10, node.y + node.height / 2 + 5);

            // Label
            ctx.fillStyle = colors.text;
            ctx.font = `${theme.datasetFontSize}px ${theme.fontFamily}`;
            const label = truncate(node.label, 16);
            ctx.fillText(label, node.x + 35, node.y + node.height / 2 - 2);

            // Type label
            if (node.datasetType !== 'intermediate') {
                ctx.font = `${theme.datasetFontSize - 3}px ${theme.fontFamily}`;
                ctx.globalAlpha = 0.7;
                ctx.fillText(`[${node.datasetType.toUpperCase()}]`, node.x + 35, node.y + node.height / 2 + 14);
                ctx.globalAlpha = 1;
            }
        }

        function drawRecipe(node) {
            const recipeType = node.recipeType || 'default';
            const colors = theme.recipes[recipeType] || theme.recipes.default;

            // Background
            ctx.beginPath();
            roundRect(ctx, node.x, node.y, node.width, node.height, theme.recipeRadius);
            ctx.fillStyle = colors.bg;
            ctx.fill();
            ctx.strokeStyle = colors.border;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Icon
            ctx.fillStyle = colors.text;
            ctx.font = `${theme.iconFontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText(node.icon || '■', node.x + node.width / 2, node.y + node.height / 2 - 5);

            // Label
            ctx.font = `bold ${theme.recipeFontSize}px ${theme.fontFamily}`;
            const label = recipeType.charAt(0).toUpperCase() + recipeType.slice(1);
            ctx.fillText(label, node.x + node.width / 2, node.y + node.height / 2 + 12);

            // Details
            if (node.details) {
                ctx.font = `${theme.recipeFontSize - 2}px ${theme.fontFamily}`;
                ctx.globalAlpha = 0.7;
                ctx.fillText(node.details, node.x + node.width / 2, node.y + node.height / 2 + 24);
                ctx.globalAlpha = 1;
            }

            ctx.textAlign = 'left';
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
        }

        function truncate(str, len) {
            return str.length > len ? str.substring(0, len - 2) + '...' : str;
        }

        // Tooltip handling
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            let hoveredNode = null;
            for (const node of nodes) {
                if (x >= node.x && x <= node.x + node.width &&
                    y >= node.y && y <= node.y + node.height) {
                    hoveredNode = node;
                    break;
                }
            }

            if (hoveredNode) {
                let info = hoveredNode.type === 'dataset'
                    ? `Dataset: ${hoveredNode.label}\nType: ${hoveredNode.datasetType}`
                    : `Recipe: ${hoveredNode.recipeType}\n${hoveredNode.details || ''}`;

                tooltip.textContent = info;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 10) + 'px';
                tooltip.style.top = (e.clientY + 10) + 'px';
                canvas.style.cursor = 'pointer';
            } else {
                tooltip.style.display = 'none';
                canvas.style.cursor = 'default';
            }
        });

        canvas.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
        });

        // Build legend
        function buildLegend() {
            const legend = document.getElementById('legend');
            const items = [
                { label: 'Input Dataset', colors: theme.input },
                { label: 'Output Dataset', colors: theme.output },
                { label: 'Intermediate', colors: theme.intermediate },
            ];

            Object.entries(theme.recipes).forEach(([type, colors]) => {
                if (type !== 'default') {
                    items.push({ label: type.charAt(0).toUpperCase() + type.slice(1), colors });
                }
            });

            items.slice(0, 8).forEach(item => {
                const div = document.createElement('div');
                div.className = 'legend-item';
                div.innerHTML = `
                    <div class="legend-color" style="background: ${item.colors.bg}; border-color: ${item.colors.border}"></div>
                    <span>${item.label}</span>
                `;
                legend.appendChild(div);
            });
        }

        // Initialize
        drawFlow();
        buildLegend();
    </script>
</body>
</html>
